{% extends 'users/base.html' %}

{% block title %}Change Password - Searn{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h3 class="text-center">Change Password</h3>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="{{ form.old_password.id_for_label }}" class="form-label">{{ form.old_password.label }}</label>
                        {{ form.old_password }}
                    </div>
                    <div class="mb-3">
                        <label for="{{ form.new_password.id_for_label }}" class="form-label">{{ form.new_password.label }}</label>
                        {{ form.new_password }}
                        <div class="form-text">{{ form.new_password.help_text }}</div>
                    </div>
                    <div class="mb-3">
                        <label for="{{ form.confirm_new_password.id_for_label }}" class="form-label">{{ form.confirm_new_password.label }}</label>
                        {{ form.confirm_new_password }}
                    </div>
                    <button type="submit" class="btn btn-warning w-100">Change Password</button>
                </form>
                <p class="mt-3 text-center"><a href="{% url 'profile' %}">Back to Profile</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
