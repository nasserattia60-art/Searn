{% extends 'users/base.html' %}

{% block title %}Delete Account - Searn{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">
                <h3 class="text-center">Delete Account</h3>
            </div>
            <div class="card-body">
                <div class="alert alert-warning">
                    <strong>Warning:</strong> This action is irreversible. All your data will be permanently deleted.
                </div>
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="{{ form.confirm_password.id_for_label }}" class="form-label">{{ form.confirm_password.label }}</label>
                        {{ form.confirm_password }}
                    </div>
                    <button type="submit" class="btn btn-danger w-100">Delete My Account</button>
                </form>
                <p class="mt-3 text-center"><a href="{% url 'profile' %}">Cancel and back to Profile</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
