{% extends 'users/base.html' %}

{% block title %}Create Class - Searn{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h3 class="text-center">Create New Class</h3>
            </div>
            <div class="card-body">
                <form method="post" action="{% url 'create-class' %}">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="class_name" class="form-label">Class Name</label>
                        <input type="text" name="class_name" id="class_name" class="form-control" maxlength="255" required>
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">Description</label>
                        <textarea name="description" id="description" class="form-control" rows="3" required></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="playlist_url" class="form-label">YouTube Playlist URL</label>
                        <input type="url" name="playlist_url" id="playlist_url" class="form-control" placeholder="https://www.youtube.com/playlist?list=..." required>
                        <div class="form-text">Paste the full YouTube playlist link. The videos will be extracted automatically.</div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Create Class</button>
                </form>
                <p class="mt-3 text-center"><a href="{% url 'class-home' %}">Back to Classes</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
