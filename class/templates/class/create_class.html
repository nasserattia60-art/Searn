{% extends 'users/base.html' %}

{% block title %}Create Class - Searn{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h3 class="text-center">Create New Class</h3>
            </div>
            <div class="card-body">
                <form method="post" action="{% url 'create-class' %}">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="{{ form.class_name.id_for_label }}" class="form-label">{{ form.class_name.label }}</label>
                        {{ form.class_name }}
                    </div>
                    <div class="mb-3">
                        <label for="{{ form.description.id_for_label }}" class="form-label">{{ form.description.label }}</label>
                        {{ form.description }}
                    </div>
                    <div class="mb-3">
                        <label for="{{ form.playlist_url.id_for_label }}" class="form-label">{{ form.playlist_url.label }}</label>
                        {{ form.playlist_url }}
                        <div class="form-text">{{ form.playlist_url.help_text }}</div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Create Class</button>
                </form>
                <p class="mt-3 text-center"><a href="{% url 'class-home' %}">Back to Classes</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
